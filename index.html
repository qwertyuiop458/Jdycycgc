<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Медбрат: Ночная смена</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, sans-serif;
    }
    body {
      margin: 0;
      display: flex;
      min-height: 100vh;
      background: #f3f8ff;
      color: #123;
      align-items: center;
      justify-content: center;
    }
    .app {
      width: min(96vw, 480px);
      text-align: center;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
    }
    canvas {
      width: 100%;
      max-width: 480px;
      background: #eef6ff;
      border: 2px solid #7f9db9;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    }
    .controls {
      margin-top: 0.75rem;
      text-align: left;
      font-size: 0.95rem;
      line-height: 1.4;
      background: #fff;
      border-radius: 8px;
      padding: 0.75rem;
    }
    .row {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 0.5rem;
    }
    button {
      border: none;
      border-radius: 7px;
      background: #1d78d6;
      color: white;
      padding: 0.55rem 0.8rem;
      font-size: 0.95rem;
      cursor: pointer;
    }
    button.secondary {
      background: #6d7f95;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Медбрат: Ночная смена</h1>
    <canvas id="game" width="360" height="560" aria-label="Игра про медбрата"></canvas>
    <div class="row">
      <button id="startBtn">Новая смена</button>
      <button id="pauseBtn" class="secondary">Пауза</button>
    </div>
    <div class="controls">
      <strong>Управление:</strong>
      <div>⬅️ / ➡️ — движение по коридорам</div>
      <div>P — пауза, R — рестарт</div>
      <div>Задача: помогайте пациентам (+10) и собирайте лекарства (+5). 5 пропусков — конец смены.</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');

    const laneCount = 3;
    const laneWidth = canvas.width / laneCount;
    const SHIFT_SECONDS = 60;
    const MAX_MISSES = 5;

    const state = {
      running: false,
      paused: false,
      score: 0,
      misses: 0,
      timeLeft: SHIFT_SECONDS,
      nurseLane: 1,
      patient: null,
      medicine: null,
      lastTime: 0
    };

    function laneCenter(lane) {
      return lane * laneWidth + laneWidth / 2;
    }

    function spawnPatient() {
      state.patient = {
        lane: Math.floor(Math.random() * laneCount),
        y: 40,
        speed: 90 + Math.random() * 90
      };
    }

    function spawnMedicine() {
      state.medicine = {
        lane: Math.floor(Math.random() * laneCount),
        y: 70,
        speed: 80 + Math.random() * 80
      };
    }

    function resetGame() {
      state.running = true;
      state.paused = false;
      state.score = 0;
      state.misses = 0;
      state.timeLeft = SHIFT_SECONDS;
      state.nurseLane = 1;
      state.lastTime = performance.now();
      spawnPatient();
      spawnMedicine();
      requestAnimationFrame(loop);
    }

    function update(dt) {
      if (!state.running || state.paused) return;
      if (state.timeLeft <= 0 || state.misses >= MAX_MISSES) {
        state.running = false;
        return;
      }

      state.timeLeft -= dt;
      if (state.timeLeft < 0) state.timeLeft = 0;

      state.patient.y += state.patient.speed * dt;
      state.medicine.y += state.medicine.speed * dt;

      const nurseX = laneCenter(state.nurseLane);
      const nurseY = canvas.height - 46;
      const patientX = laneCenter(state.patient.lane);
      const medX = laneCenter(state.medicine.lane);

      if (Math.abs(nurseX - patientX) < 12 && Math.abs(nurseY - state.patient.y) < 20) {
        state.score += 10;
        spawnPatient();
      } else if (state.patient.y > canvas.height + 20) {
        state.misses += 1;
        spawnPatient();
      }

      if (Math.abs(nurseX - medX) < 12 && Math.abs(nurseY - state.medicine.y) < 20) {
        state.score += 5;
        spawnMedicine();
      } else if (state.medicine.y > canvas.height + 20) {
        spawnMedicine();
      }
    }

    function drawLaneLines() {
      ctx.strokeStyle = '#b5cce6';
      ctx.lineWidth = 2;
      for (let i = 1; i < laneCount; i++) {
        const x = i * laneWidth;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
    }

    function drawNurse() {
      const x = laneCenter(state.nurseLane);
      const y = canvas.height - 46;

      ctx.fillStyle = '#2f8be8';
      ctx.fillRect(x - 11, y - 8, 22, 28);
      ctx.fillStyle = '#ffd6b3';
      ctx.beginPath();
      ctx.arc(x, y - 14, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.strokeRect(x - 12, y - 9, 24, 30);
    }

    function drawPatient() {
      const x = laneCenter(state.patient.lane);
      const y = state.patient.y;
      ctx.fillStyle = '#d45a5a';
      ctx.fillRect(x - 12, y - 8, 24, 16);
      ctx.fillStyle = '#6f1111';
      ctx.font = 'bold 18px Arial';
      ctx.fillText('!', x - 3, y - 12);
    }

    function drawMedicine() {
      const x = laneCenter(state.medicine.lane);
      const y = state.medicine.y;
      ctx.fillStyle = '#43b15f';
      ctx.fillRect(x - 9, y - 9, 18, 18);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x, y - 5);
      ctx.lineTo(x, y + 5);
      ctx.moveTo(x - 5, y);
      ctx.lineTo(x + 5, y);
      ctx.stroke();
    }

    function drawHud() {
      ctx.fillStyle = '#153c75';
      ctx.font = 'bold 16px Arial';
      ctx.fillText('Очки: ' + state.score, 10, 24);
      ctx.fillText('Ошибки: ' + state.misses + '/' + MAX_MISSES, 210, 24);
      ctx.fillText('Смена: ' + Math.ceil(state.timeLeft), 140, 46);
    }

    function drawOverlay() {
      if (state.running) return;
      ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.font = 'bold 28px Arial';
      const title = state.timeLeft <= 0 ? 'Смена завершена' : 'Смена сорвана';
      ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 26);
      ctx.font = 'bold 22px Arial';
      ctx.fillText('Итог: ' + state.score, canvas.width / 2, canvas.height / 2 + 10);
      ctx.font = '16px Arial';
      ctx.fillText('Нажмите "Новая смена" или R', canvas.width / 2, canvas.height / 2 + 44);
      ctx.textAlign = 'start';
    }

    function drawPaused() {
      if (!state.paused || !state.running) return;
      ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 28px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('ПАУЗА', canvas.width / 2, canvas.height / 2);
      ctx.textAlign = 'start';
    }

    function render() {
      ctx.fillStyle = '#eef6ff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawLaneLines();
      drawHud();
      if (state.patient) drawPatient();
      if (state.medicine) drawMedicine();
      drawNurse();
      drawPaused();
      drawOverlay();
    }

    function loop(now) {
      const dt = Math.min((now - state.lastTime) / 1000, 0.05);
      state.lastTime = now;
      update(dt);
      render();

      if (state.running || state.paused) {
        requestAnimationFrame(loop);
      }
    }

    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') {
        state.nurseLane = Math.max(0, state.nurseLane - 1);
      } else if (e.key === 'ArrowRight') {
        state.nurseLane = Math.min(laneCount - 1, state.nurseLane + 1);
      } else if (e.key.toLowerCase() === 'p') {
        if (state.running) {
          state.paused = !state.paused;
          if (!state.paused) {
            state.lastTime = performance.now();
            requestAnimationFrame(loop);
          }
        }
      } else if (e.key.toLowerCase() === 'r') {
        resetGame();
      }
    });

    startBtn.addEventListener('click', resetGame);
    pauseBtn.addEventListener('click', () => {
      if (!state.running) return;
      state.paused = !state.paused;
      if (!state.paused) {
        state.lastTime = performance.now();
        requestAnimationFrame(loop);
      }
    });

    render();
  </script>
</body>
</html>
